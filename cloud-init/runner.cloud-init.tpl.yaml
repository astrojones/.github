#cloud-config
# Ephemeral GitHub Actions runner for the astrojones org (Hetzner Cloud).
#
# RENDERED IN CI: envsubst is restricted to the placeholders below, so every
# other shell token ($DEV, $UUID, $(...), $VERSION_CODENAME, loop $i) passes
# through verbatim into the VM's runcmd script:
#
#   envsubst '$ORG_NAME $RUNNER_TOKEN $LABELS $RUNNER_IMAGE $RUNNER_WORKDIR $VOLUME_ID' \
#     < runner.cloud-init.tpl.yaml > user-data.yaml
#
# Placeholders:
#   ORG_NAME        GitHub org to register under (e.g. astrojones)
#   RUNNER_TOKEN    short-lived org registration token (~1h TTL; minted just-in-time)
#   LABELS          comma-separated runner labels incl. the unique per-run label
#   RUNNER_IMAGE    pinned runner image, e.g. myoung34/github-runner:2.334.0
#   RUNNER_WORKDIR  runner work dir; bind-mounted host==container for container: jobs
#   VOLUME_ID       Hetzner volume id for the Docker-layer cache, or empty for none
#
# The ONLY GitHub credential that reaches this VM is RUNNER_TOKEN (the 1-hour
# registration token). The long-lived PAT never leaves CI.
package_update: true
packages:
  - ca-certificates
  - curl
  - gnupg

runcmd:
  # runcmd executes as ONE sequential script in cloud-init's Final stage, so the
  # order below is authoritative: cache volume -> daemon.json -> Docker -> runner.

  # 1. Optional persistent Docker-layer cache on a pre-attached Hetzner volume.
  #    Format ONLY if blank so cached layers survive across ephemeral boxes.
  #    daemon.json must be written BEFORE Docker is installed (apt install starts
  #    dockerd immediately and it reads data-root on first start).
  - |
    if [ -n "$VOLUME_ID" ]; then
      DEV="/dev/disk/by-id/scsi-0HC_Volume_$VOLUME_ID"
      for i in $(seq 1 30); do [ -b "$DEV" ] && break; sleep 1; done
      udevadm settle || true
      blkid "$DEV" >/dev/null 2>&1 || mkfs.ext4 -F -L dockercache "$DEV"
      mkdir -p /mnt/cache
      UUID="$(blkid -s UUID -o value "$DEV")"
      grep -q "$UUID" /etc/fstab || echo "UUID=$UUID /mnt/cache ext4 discard,nofail,defaults 0 0" >> /etc/fstab
      systemctl daemon-reload
      mount -a
      mkdir -p /mnt/cache/docker /etc/docker
      printf '{ "data-root": "/mnt/cache/docker" }\n' > /etc/docker/daemon.json
    fi

  # 2. Docker Engine from the official apt repo (reproducible; production-grade).
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    printf 'Types: deb\nURIs: https://download.docker.com/linux/debian\nSuites: %s\nComponents: stable\nArchitectures: %s\nSigned-By: /etc/apt/keyrings/docker.asc\n' \
      "$(. /etc/os-release && echo "$VERSION_CODENAME")" "$(dpkg --print-architecture)" \
      > /etc/apt/sources.list.d/docker.sources
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # 3. Launch the one-shot ephemeral runner. EPHEMERAL=true => GitHub assigns a
  #    single job then de-registers it; the listener exits and --rm cleans up.
  #    RUNNER_WORKDIR is bind-mounted host==container (required for container: jobs).
  - mkdir -p "$RUNNER_WORKDIR"
  - |
    docker run -d --rm --name gh-runner \
      -e RUNNER_SCOPE=org \
      -e ORG_NAME="$ORG_NAME" \
      -e RUNNER_TOKEN="$RUNNER_TOKEN" \
      -e EPHEMERAL=true \
      -e DISABLE_AUTO_UPDATE=true \
      -e LABELS="$LABELS" \
      -e RUNNER_WORKDIR="$RUNNER_WORKDIR" \
      -v /var/run/docker.sock:/var/run/docker.sock \
      -v "$RUNNER_WORKDIR":"$RUNNER_WORKDIR" \
      "$RUNNER_IMAGE"

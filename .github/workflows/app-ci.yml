name: app-ci

# Reusable BUILD + PUSH workflow for nuklaut apps.
#
# Builds one or more images from a JSON matrix and pushes them to
# ghcr.io/<owner>/<repo>/<name> tagged :<sha> and :latest. Runs on GitHub-hosted
# ubuntu-latest — image build/push needs no self-hosted runner, so CI stays
# decoupled from the controller (only `nuk-apply.yml` runs there).
#
# Caller (in the consumer repo):
#   jobs:
#     images:
#       uses: astrojones/.github/.github/workflows/app-ci.yml@main
#       secrets: inherit
#       with:
#         images: >-
#           [
#             {"name":"backend","context":"./backend",
#              "prebuild":"mkdir -p backend/fixtures && cp -r frontend/tests/fixtures/classes backend/fixtures/",
#              "build_args":"BUILD_SHA=${{ github.sha }}"},
#             {"name":"frontend","context":"./frontend"}
#           ]
#
# Per matrix entry: name (required), context (required), dockerfile (optional,
# defaults to <context>/Dockerfile), build_args (optional, newline-separated),
# prebuild (optional shell run before build, e.g. to assemble a build context).

on:
  workflow_call:
    inputs:
      images:
        description: 'JSON array of {name, context, dockerfile?, build_args?, prebuild?}'
        type: string
        required: true
      push:
        description: Push to GHCR (false = build-only validation, e.g. on PRs)
        type: boolean
        required: false
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(inputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve lowercase image ref
        id: img
        run: echo "ref=$(echo 'ghcr.io/${{ github.repository }}/${{ matrix.image.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Prebuild
        if: ${{ matrix.image.prebuild != '' && matrix.image.prebuild != null }}
        run: ${{ matrix.image.prebuild }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile || format('{0}/Dockerfile', matrix.image.context) }}
          push: ${{ inputs.push }}
          tags: |
            ${{ steps.img.outputs.ref }}:${{ github.sha }}
            ${{ steps.img.outputs.ref }}:latest
          build-args: ${{ matrix.image.build_args }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

name: release-please (reusable)

# Org-wide release automation. Each repo calls this on push to main:
#
#   jobs:
#     release:
#       uses: astrojones/.github/.github/workflows/release-please.yml@main
#       secrets: inherit
#
# Requires per-repo release-please-config.json + .release-please-manifest.json.
#
# No manual merge: the release PR is set to auto-merge, so a release cuts itself
# once the repo's required `ci` check goes green. (auto-merge must be enabled on
# the repo and `ci` must be a required status check on main — both are part of
# repo onboarding. Without a required check, --auto is rejected by GitHub.)
#
# Token: the built-in GITHUB_TOKEN is sufficient for every repo whose release
# does NOT drive a tag/`release:published`-triggered workflow. nuk is the lone
# exception and folds its build into a release_created-gated job in its own
# caller, reading this workflow's `release_created`/`tag_name` outputs.

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to the release-please config in the caller repo
        type: string
        required: false
        default: release-please-config.json
      manifest-file:
        description: Path to the release-please manifest in the caller repo
        type: string
        required: false
        default: .release-please-manifest.json
    outputs:
      release_created:
        description: "true if a release was created on this run"
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: The tag of the created release (when release_created)
        value: ${{ jobs.release-please.outputs.tag_name }}

# Hands-free releases require a bot identity, not the built-in GITHUB_TOKEN:
#   * GITHUB_TOKEN-driven pushes/merges don't trigger further workflows (recursion
#     guard), so a token-merged release PR would never fire the release-creation
#     run — no tag, no release, no deploy.
#   * Free-plan private repos also can't use branch protection / native auto-merge.
# Provide an org secret RELEASE_PLEASE_TOKEN (GitHub App installation token or a
# PAT) and pass it with `secrets: inherit`; we fall back to GITHUB_TOKEN, which
# still opens release PRs but leaves the final merge to a human.

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}

      # Squash-merge the release PR so no human merges it. We merge the PR number
      # the action just returned (steps.rp.outputs.pr) rather than listing PRs —
      # listing with the bot token came back empty in practice, and the output is
      # authoritative and immediate. The PR object JSON is passed via env (never
      # inlined into the script) so its body can't break parsing or inject.
      #
      # The PR is mechanical (version + CHANGELOG; the source already passed `ci`
      # on the push that produced it), and Free-plan private repos have no required
      # checks, so we merge directly regardless of the PR's own (possibly
      # approval-gated) `ci`. When merged with RELEASE_PLEASE_TOKEN (a bot
      # identity) the merge push triggers the next run that cuts the tag/release;
      # with the fallback GITHUB_TOKEN the merge still happens but the release is
      # only cut on the next human push (so provide the token).
      - name: Merge the release PR
        if: ${{ steps.rp.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          RP_PR: ${{ steps.rp.outputs.pr }}
        run: |
          set -euo pipefail
          pr=$(printf '%s' "$RP_PR" | jq -r '.number // empty')
          if [ -n "$pr" ]; then
            echo "Merging release PR #${pr}"
            gh pr merge --squash --delete-branch "$pr"
          else
            echo "no release PR number in action output; nothing to merge"
          fi

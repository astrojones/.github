name: release (reusable, no-PR)

# No-PR release on the self-hosted nuklaut runner. On push to main:
#   1. derive the next version from conventional commits since the last tag,
#   2. stamp it into the in-code version files (package.json / *.toml / *.py),
#   3. commit that straight to main with [skip ci] (no PR),
#   4. create the tag + GitHub release.
# No release PR, no auto-merge, no PAT. A GITHUB_TOKEN push to main does not
# re-trigger workflows (and [skip ci] is belt-and-suspenders), so no loop.
#
#   jobs:
#     release:
#       uses: astrojones/.github/.github/workflows/release.yml@main
#       secrets: inherit
#       with:
#         version-files: |        # optional; omit for repos with no in-code version
#           package.json
#
# Callers that build/deploy on release add a job gated on the `released` output
# IN THE SAME RUN (a GITHUB_TOKEN-created tag/release triggers nothing).

on:
  workflow_call:
    inputs:
      version-files:
        description: Newline-separated files to stamp the version into (package.json | *.toml [project].version | *.py __version__).
        type: string
        required: false
        default: ''
      runs-on:
        # JSON array of runner labels. Default is the nuklaut self-hosted runner
        # (no GitHub-hosted minutes on private repos). PUBLIC repos MUST override
        # to '["ubuntu-latest"]': the self-hosted runner refuses public-repo jobs
        # (allows_public_repositories=false) — and must, since it mounts
        # docker.sock + /opt/nuklaut, so a fork PR there could own the controller.
        # Public repos get unlimited free GitHub-hosted minutes anyway.
        type: string
        required: false
        default: '["self-hosted", "nuklaut"]'
    outputs:
      released:
        description: "true if a new version was committed/tagged/released this run"
        value: ${{ jobs.release.outputs.released }}
      tag:
        description: "the new tag (e.g. v1.2.3), empty when nothing was released"
        value: ${{ jobs.release.outputs.tag }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    outputs:
      released: ${{ steps.rel.outputs.released || steps.bootstrap.outputs.released }}
      tag: ${{ steps.rel.outputs.tag || steps.bootstrap.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags, so the version can be computed

      # First release for a brand-new repo. With no prior tag there's no delta to
      # analyze, and a fresh repo should be tagged at its in-code version rather
      # than a commit-derived bump. So bootstrap directly — tag HEAD at the in-code
      # version (first version-file, else 0.1.0), push the tag, create the release —
      # and skip computation this run. No-op once any tag exists (every
      # already-released repo).
      - name: Bootstrap first release when no tag exists
        id: bootstrap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          FILES: ${{ inputs.version-files }}
        run: |
          set -euo pipefail
          if [ -n "$(git tag)" ]; then echo "tags exist; skipping bootstrap"; exit 0; fi
          version="$(python3 - <<'PY'
          import os, re, json, pathlib
          v = ""
          for f in (l.strip() for l in os.environ.get("FILES", "").splitlines() if l.strip()):
              p = pathlib.Path(f)
              if not p.is_file():
                  continue
              t = p.read_text()
              if f.endswith(".json"):
                  v = str(json.loads(t).get("version", ""))
              elif f.endswith(".toml"):
                  m = re.search(r'(?m)^version\s*=\s*"([^"]*)"', t); v = m.group(1) if m else ""
              else:
                  m = re.search(r'(?m)^__version__\s*=\s*"([^"]*)"', t); v = m.group(1) if m else ""
              if v:
                  break
          print(v or "0.1.0")
          PY
          )"
          TAG="v${version}"
          git config user.name "nuklaut-release"
          git config user.email "release@astrojones.de"
          git tag "$TAG"
          git push origin "$TAG"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "$(TAG="$TAG" python3 -c 'import json,os; print(json.dumps({"tag_name":os.environ["TAG"],"name":os.environ["TAG"],"generate_release_notes":True}))')"
          { echo "released=true"; echo "tag=${TAG}"; } >> "$GITHUB_OUTPUT"

      # Derive the next version from conventional commits since the last tag.
      # Breaking changes (`!` shorthand feat!/fix!/refactor! AND a BREAKING CHANGE /
      # BREAKING-CHANGE footer) force a MAJOR bump; feat -> minor and fix -> patch
      # are computed below. Also flag whether ANY releasing commit (feat/fix/
      # breaking) exists so the guard below can fail loudly if nothing gets computed.
      - name: Scan commits + compute next version
        id: scan
        if: ${{ steps.bootstrap.outputs.released != 'true' }}
        run: |
          set -euo pipefail
          last="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$last" ]; then range="${last}..HEAD"; else range="HEAD"; fi
          subjects="$(git log --format=%s "$range")"
          bodies="$(git log --format=%B "$range")"

          breaking=false
          # `!` breaking shorthand in the type: feat!:  fix(scope)!:  refactor!:
          if printf '%s\n' "$subjects" | grep -Eq '^[A-Za-z]+(\([^)]*\))?!:'; then breaking=true; fi
          # BREAKING CHANGE: / BREAKING-CHANGE: footer
          if printf '%s\n' "$bodies" | grep -Eq '^BREAKING[ -]CHANGE:'; then breaking=true; fi

          releasing=false
          [ "$breaking" = true ] && releasing=true
          if printf '%s\n' "$subjects" | grep -Eq '^(feat|fix)(\([^)]*\))?!?:'; then releasing=true; fi

          forced_tag=""; forced_version=""
          if [ "$breaking" = true ]; then
            base="${last#v}"; major="${base%%.*}"
            case "$major" in ''|*[!0-9]*) major=0 ;; esac
            forced_version="$((major + 1)).0.0"
            forced_tag="v${forced_version}"
          fi

          # Next version (replaces github-tag-action dry-run with default_bump:false).
          # feat -> minor, fix -> patch, breaking -> major (from forced_version above);
          # anything else -> empty -> no release. new_tag/new_version are the single
          # source of truth the `rel` step consumes.
          has_feat=false; printf '%s\n' "$subjects" | grep -Eq '^feat(\([^)]*\))?:' && has_feat=true
          has_fix=false;  printf '%s\n' "$subjects" | grep -Eq '^fix(\([^)]*\))?:'  && has_fix=true

          new_version=""; new_tag=""
          base="${last#v}"; IFS=. read -r MA MI PA <<< "${base:-0.0.0}"
          case "$MA" in ''|*[!0-9]*) MA=0 ;; esac
          case "$MI" in ''|*[!0-9]*) MI=0 ;; esac
          case "$PA" in ''|*[!0-9]*) PA=0 ;; esac
          if [ "$breaking" = true ]; then
            new_version="$forced_version"            # major
          elif [ "$has_feat" = true ]; then
            new_version="${MA}.$((MI + 1)).0"        # minor
          elif [ "$has_fix" = true ]; then
            new_version="${MA}.${MI}.$((PA + 1))"    # patch
          fi
          [ -n "$new_version" ] && new_tag="v${new_version}"

          {
            echo "breaking=${breaking}"
            echo "releasing=${releasing}"
            echo "forced_tag=${forced_tag}"
            echo "forced_version=${forced_version}"
            echo "new_version=${new_version}"
            echo "new_tag=${new_tag}"
          } >> "$GITHUB_OUTPUT"
          echo "scan: last=${last:-<none>} range=${range} breaking=${breaking} releasing=${releasing} new=${new_tag:-<none>}"

      - name: Stamp version, commit to main, tag + release
        id: rel
        # scan computed the next version inline (feat->minor / fix->patch, and the
        # forced MAJOR for a breaking change). Empty new_tag => nothing to release.
        if: ${{ steps.bootstrap.outputs.released != 'true' && steps.scan.outputs.new_tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.scan.outputs.new_tag }}
          VERSION: ${{ steps.scan.outputs.new_version }}
          FILES: ${{ inputs.version-files }}
        run: |
          set -euo pipefail
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || { echo "version-file '$f' not present, skipping"; continue; }
            python3 - "$f" "$VERSION" <<'PY'
          import sys, re, json, pathlib
          path, v = sys.argv[1], sys.argv[2]
          p = pathlib.Path(path); t = p.read_text()
          if path.endswith(".json"):
              d = json.loads(t); d["version"] = v
              p.write_text(json.dumps(d, indent=2) + "\n")
          elif path.endswith(".toml"):
              t2, n = re.subn(r'(?m)^version\s*=\s*"[^"]*"', f'version = "{v}"', t, count=1)
              assert n == 1, f"{path}: no '[project] version = \"...\"' line"
              p.write_text(t2)
          else:
              t2, n = re.subn(r'(?m)^(__version__\s*=\s*)"[^"]*"', rf'\g<1>"{v}"', t, count=1)
              assert n == 1, f"{path}: no '__version__ = \"...\"' line"
              p.write_text(t2)
          PY
            git add -- "$f"
          done <<< "$FILES"

          git config user.name "nuklaut-release"
          git config user.email "release@astrojones.de"
          # Only commit if a version-file actually changed. When the computed
          # version equals what's already in-code (e.g. nothing to bump), there's
          # no staged diff and `git commit` would fail under `set -e` — guard it.
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): ${TAG} [skip ci]"
            git push origin HEAD:main
          fi
          git tag "$TAG"
          git push origin "$TAG"

          # Create the GitHub release via REST (no dependency on gh being on the
          # self-hosted runner). generate_release_notes builds notes from history.
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "$(python3 -c 'import json,os; print(json.dumps({"tag_name":os.environ["TAG"],"name":os.environ["TAG"],"generate_release_notes":True}))')"

          { echo "released=true"; echo "tag=${TAG}"; } >> "$GITHUB_OUTPUT"

      # Loud guard: if there WERE releasing commits (feat/fix or breaking) since the
      # last tag but nothing was released this run, fail instead of silently no-oping
      # (the original bug). Skipped on the bootstrap path and on chore/docs-only runs.
      - name: Fail if a releasing change did not produce a release
        if: ${{ steps.bootstrap.outputs.released != 'true' && steps.scan.outputs.releasing == 'true' && steps.rel.outputs.released != 'true' }}
        run: |
          echo "::error::Releasing commits (feat/fix or breaking) exist since the last tag, but no version was computed or released. Refusing to succeed silently." >&2
          exit 1

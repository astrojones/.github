name: release (reusable, no-PR)

# No-PR release. On push to main, derive the next version from the conventional
# commits since the last tag, then create the tag + GitHub release. There is no
# release PR, no auto-merge, no PAT — the version lives in the tag.
#
#   jobs:
#     release:
#       uses: astrojones/.github/.github/workflows/release.yml@main
#       secrets: inherit
#
# Callers that build/deploy on release add a job gated on the `released` output
# IN THE SAME RUN — a tag/release created with GITHUB_TOKEN does not trigger
# tag- or release-triggered workflows (recursion guard), so post-release work
# must happen here rather than in a separate `on: push: tags` workflow.

on:
  workflow_call:
    outputs:
      released:
        description: "true if a new version was tagged + released this run"
        value: ${{ jobs.release.outputs.released }}
      tag:
        description: "the new tag (e.g. v1.2.3), empty when nothing was released"
        value: ${{ jobs.release.outputs.tag }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.tag.outputs.new_tag != '' }}
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, so the version can be computed

      # Conventional commits since the last tag -> next semver. default_bump:false
      # means a push with no feat/fix/breaking commit produces no tag (new_tag
      # stays empty), so chore/ci/docs-only pushes don't cut a release.
      - name: Compute next version + tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: main

      - name: Create GitHub release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.new_tag }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes
